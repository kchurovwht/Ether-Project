<script>
const canvas = document.getElementById('ripple-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; }
resize(); window.addEventListener('resize',resize);
class Ring { constructor(x,y,delay){ this.x=x;this.y=y;this.r=0;this.maxR=Math.max(canvas.width,canvas.height)*0.75;this.alpha=0;this.speed=0.55+Math.random()*0.3;this.delay=delay;this.age=-delay;this.thickness=1+Math.random()*1.2; } update(){ this.age+=0.4;if(this.age<0)return;this.r+=this.speed;const p=this.r/this.maxR;this.alpha=p<0.15?(p/0.15)*0.5:0.5*(1-(p-0.15)/0.85); } draw(){ if(this.age<0||this.alpha<=0)return;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.strokeStyle=`rgba(212,175,136,${this.alpha})`;ctx.lineWidth=this.thickness;ctx.stroke(); } isDone(){ return this.age>=0&&this.r>=this.maxR; } }
const sources=[{xFrac:0.5,yFrac:0.5},{xFrac:0.2,yFrac:0.7},{xFrac:0.8,yFrac:0.3}];
let rings=[];
function spawnRings(){ sources.forEach((s,si)=>{ for(let i=0;i<7;i++){ const x=s.xFrac*canvas.width,y=s.yFrac*canvas.height; rings.push(new Ring(x,y,si*80+i*120)); } }); }
spawnRings();
function animate(){ if(canvas.width!==canvas.offsetWidth||canvas.height!==canvas.offsetHeight){resize();rings=[];spawnRings();} ctx.clearRect(0,0,canvas.width,canvas.height); rings=rings.filter(r=>{r.update();r.draw();return!r.isDone();}); if(rings.length<3)spawnRings(); requestAnimationFrame(animate); }
animate();
document.getElementById('yoga-icon1').textContent='🌿';
document.getElementById('yoga-icon2').textContent='🌬️';
document.getElementById('yoga-icon3').textContent='🧠';
document.getElementById('yoga-icon4').textContent='💛';
</script>

<script>
// Schedule
let svcData = null;
async function loadSvcSchedule() {
    try {
        const r = await fetch('../programa.json?t=' + Date.now());
        svcData = await r.json();
        const lbl = document.getElementById('svc-week-label');
        if (svcData.sedmitza) lbl.textContent = svcData.sedmitza;
    } catch(e) { svcData = null; }
    renderServiceSchedule();
}
function renderServiceSchedule() {
    const lang = getLang();
    const days = T[lang].days;
    const tbody = document.getElementById('svc-tbody');
    if (!svcData || !svcData.chasyove) {
        tbody.innerHTML = `<tr><td colspan="3" style="padding:1.5rem;text-align:center;color:#aaa;">${t('svc_no_classes')}</td></tr>`;
        return;
    }
    const rows = svcData.chasyove.filter(c => c.vid==='yoga');
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="3" style="padding:1.5rem;text-align:center;color:#aaa;">${t('svc_no_classes')}</td></tr>`;
    } else {
        tbody.innerHTML = rows.map(c => `<tr>
            <td>${days[c.den] || c.den}</td>
            <td style="font-weight:500">${c.chas}</td>
            <td style="color:#888">${c.vodesh}</td>
        </tr>`).join('');
    }
    // Update WhatsApp link with translated message
    const waMsg = t('yoga_wa_msg');
    document.getElementById('wa-btn').href = 'https://wa.me/359893679292?text=' + encodeURIComponent(waMsg);
}
loadSvcSchedule();
initLang();
</script>
