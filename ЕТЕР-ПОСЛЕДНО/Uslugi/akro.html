        .btn { display: inline-block; padding: 15px 36px; background: var(--gold); color: #222; font-weight: 600; border-radius: 50px; text-decoration: none; transition: all 0.3s; margin: 6px; font-size: 1rem; }

        .footer-strip { background: #141420; color: rgba(255,255,255,0.4); text-align: center; padding: 24px; font-size: 0.85rem; }
        .footer-strip a { color: var(--gold); text-decoration: none; }

<script>
const canvas=document.getElementById('akro-canvas');const ctx=canvas.getContext('2d');let W,H;
function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
resize();window.addEventListener('resize',resize);
class Particle{constructor(g){this.groupId=g;this.reset();}reset(){const side=this.groupId===0?0.35:0.65;this.x=W*side+(Math.random()-0.5)*W*0.22;this.y=H*0.5+(Math.random()-0.5)*H*0.4;this.vx=(Math.random()-0.5)*0.6;this.vy=(Math.random()-0.5)*0.6;this.size=1.5+Math.random()*2.5;this.alpha=0.15+Math.random()*0.55;this.life=0;this.maxLife=220+Math.random()*180;}update(a){const dx=a.x-this.x,dy=a.y-this.y,dist=Math.sqrt(dx*dx+dy*dy)||1,force=0.012/dist;this.vx+=dx*force;this.vy+=dy*force;this.vx*=0.985;this.vy*=0.985;this.x+=this.vx;this.y+=this.vy;this.life++;}draw(){const p=this.life/this.maxLife,fade=p<0.15?p/0.15:1-(p-0.15)/0.85,a=this.alpha*fade,col=this.groupId===0?'rgba(212,175,136,':'rgba(200,210,230,';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=col+a+')';ctx.fill();}isDone(){return this.life>=this.maxLife;}}
const centers=[{x:0,y:0},{x:0,y:0}];
let particles=[];for(let i=0;i<80;i++)particles.push(new Particle(i%2));
function drawConn(){const g0=particles.filter(p=>p.groupId===0),g1=particles.filter(p=>p.groupId===1);g0.forEach(p0=>{g1.forEach(p1=>{const dx=p1.x-p0.x,dy=p1.y-p0.y,d=Math.sqrt(dx*dx+dy*dy);if(d<90){ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.strokeStyle=`rgba(212,175,136,${(1-d/90)*0.12})`;ctx.lineWidth=0.8;ctx.stroke();}});});}
function animate(){if(W!==canvas.offsetWidth||H!==canvas.offsetHeight){resize();particles=[];for(let i=0;i<80;i++)particles.push(new Particle(i%2));}ctx.clearRect(0,0,W,H);[0,1].forEach(g=>{const grp=particles.filter(p=>p.groupId===g);if(!grp.length)return;centers[g].x=grp.reduce((s,p)=>s+p.x,0)/grp.length;centers[g].y=grp.reduce((s,p)=>s+p.y,0)/grp.length;});drawConn();particles=particles.filter(p=>{p.update(centers[1-p.groupId]);p.draw();return!p.isDone();});while(particles.length<80)particles.push(new Particle(particles.length%2));requestAnimationFrame(animate);}
animate();
document.getElementById('akro-icon1').textContent='🤝';
document.getElementById('akro-icon2').textContent='⚡';
document.getElementById('akro-icon3').textContent='😄';
document.getElementById('akro-icon4').textContent='🌐';
</script>

<script>
// Schedule
let svcData = null;
async function loadSvcSchedule() {
    try {
        const r = await fetch('../programa.json?t=' + Date.now());
        svcData = await r.json();
        const lbl = document.getElementById('svc-week-label');
        if (svcData.sedmitza) lbl.textContent = svcData.sedmitza;
    } catch(e) { svcData = null; }
    renderServiceSchedule();
}
function renderServiceSchedule() {
    const lang = getLang();
    const days = T[lang].days;
    const tbody = document.getElementById('svc-tbody');
    if (!svcData || !svcData.chasyove) {
        tbody.innerHTML = `<tr><td colspan="3" style="padding:1.5rem;text-align:center;color:#aaa;">${t('svc_no_classes')}</td></tr>`;
        return;
    }
    const rows = svcData.chasyove.filter(c => c.vid==='akro');
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="3" style="padding:1.5rem;text-align:center;color:#aaa;">${t('svc_no_classes')}</td></tr>`;
    } else {
        tbody.innerHTML = rows.map(c => `<tr>
            <td>${days[c.den] || c.den}</td>
            <td style="font-weight:500">${c.chas}</td>
            <td style="color:#888">${c.vodesh}</td>
        </tr>`).join('');
    }
    // Update WhatsApp link with translated message
    const waMsg = t('akro_wa_msg');
    document.getElementById('wa-btn').href = 'https://wa.me/359893679292?text=' + encodeURIComponent(waMsg);
}
loadSvcSchedule();
initLang();
</script>
